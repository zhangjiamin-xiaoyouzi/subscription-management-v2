    .form-label .required { color: #ff4d4f; margin-right: 2px; }
    .form-label .help-icon {

      width: 14px; height: 14px; border-radius: 50%; background: #e8e8e8;
      color: #999; font-size: 10px; cursor: help; margin-left: 2px; vertical-align: middle;
    }
    .form-label .help-icon::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.78); color: #fff;
      font-size: 12px; line-height: 1.5;
      padding: 6px 10px; border-radius: 4px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; visibility: hidden;
      transition: opacity .15s, visibility .15s;
      z-index: 9999;
    }
    .form-label .help-icon::before {
      content: '';
      position: absolute; bottom: calc(100% + 2px); left: 50%; transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: rgba(0,0,0,.78);
      opacity: 0; visibility: hidden;
      transition: opacity .15s, visibility .15s;
      z-index: 9999;

    .form-error { font-size: 12px; color: #ff4d4f; margin-top: 4px; }

    .number-input-wrap button:first-child { border-radius: 4px 0 0 4px; }
    .number-input-wrap button:last-child { border-radius: 0 4px 4px 0; }

    .upload-box { width: 80px; height: 80px; border: 1px dashed #d9d9d9; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; background: #fafafa; color: #999; }
    .upload-box:hover { border-color: #ff4d88; color: #ff4d88; }

    .add-col-btn { display: inline-flex; align-items: center; gap: 4px; height: 32px; padding: 0 12px; font-size: 12px; color: #ff4d88; border: 1px dashed #ff4d88; border-radius: 4px; background: #fff; cursor: pointer; transition: all .15s; }
    .add-col-btn:hover { background: #fff0f6; }
    .ext-image-list { display: flex; gap: 12px; flex-wrap: wrap; }

    /* 规格表格 */
    .spec-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .spec-table th { background: #fafafa; padding: 8px 10px; text-align: left; font-weight: 500; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    .spec-table td { padding: 6px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
    .spec-table .spec-input { height: 32px; padding: 0 8px; font-size: 13px; border: 1px solid #d9d9d9; border-radius: 4px; outline: none; width: 100%; }

    .spec-table .spec-del-btn { background: none; border: none; color: #ff4d4f; font-size: 13px; cursor: pointer; padding: 4px 8px; }

    .spec-group-name-input { width: 120px; }
    .form-hint { font-size: 12px; color: #999; margin-top: 4px; }
    .checkbox-inline { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
    .checkbox-inline input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; }

    .info-tip { display: flex; align-items: flex-start; gap: 8px; padding: 10px 14px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 4px; font-size: 12px; color: #ad8b00; margin-bottom: 16px; }
    .info-tip .tip-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .form-actions { display: flex; justify-content: center; gap: 12px; padding: 20px 0; }
    .btn-primary { display: inline-flex; align-items: center; gap: 4px; height: 36px; padding: 0 24px; font-size: 14px; background: #ff4d88; color: #fff; border: 1px solid #ff4d88; border-radius: 4px; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .btn-primary:hover { background: #ff3875; }
    .btn-cancel { display: inline-flex; align-items: center; height: 36px; padding: 0 24px; font-size: 14px; background: #fff; color: #666; border: 1px solid #d9d9d9; border-radius: 4px; cursor: pointer; transition: all .2s; text-decoration: none; }
    .btn-cancel:hover { border-color: #ff4d88; color: #ff4d88; }
    .loading-text { text-align: center; padding: 40px; color: #999; font-size: 14px; }

    /* 详情模式样式 */
    .detail-value { font-size: 13px; color: #333; line-height: 32px; }
    .detail-desc { font-size: 12px; color: #999; margin-top: 2px; }
    .detail-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
    .detail-tag.green { background: #f6ffed; color: #52c41a; }
    .detail-tag.red { background: #fff2f0; color: #ff4d4f; }
    .detail-tag.blue { background: #e6f7ff; color: #1890ff; }
    .detail-tag.orange { background: #fff7e6; color: #fa8c16; }
    .detail-image { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #f0f0f0; background: #fafafa; }
    .detail-image-placeholder { width: 80px; height: 80px; border-radius: 4px; border: 1px dashed #d9d9d9; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 12px; background: #fafafa; }
    .detail-card { background: #fff; border-radius: 4px; padding: 24px; margin-bottom: 16px; }
    .detail-card h5.section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
    .detail-row { display: flex; align-items: flex-start; margin-bottom: 16px; }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-label { width: 130px; flex-shrink: 0; padding-right: 12px; font-size: 13px; color: #888; line-height: 32px; text-align: right; }
    .detail-content { flex: 1; min-height: 32px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }

    /* 富文本编辑器 */
    .richtext-editor { border: 1px solid #d9d9d9; border-radius: 4px; overflow: hidden; }
    .richtext-editor:focus-within { border-color: #ff4d88; box-shadow: 0 0 0 2px rgba(255,77,136,.1); }
    .richtext-toolbar { display: flex; align-items: center; gap: 2px; padding: 6px 8px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
    .richtext-toolbar button,
    .richtext-toolbar .richtext-img-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 26px; border: 1px solid transparent; border-radius: 3px; background: transparent; cursor: pointer; font-size: 12px; color: #555; transition: all .15s; padding: 0; }
    .richtext-toolbar button:hover,
    .richtext-toolbar .richtext-img-btn:hover { background: #e6e6e6; border-color: #d9d9d9; }
    .richtext-area { min-height: 120px; max-height: 400px; padding: 10px 12px; font-size: 13px; line-height: 1.7; color: #333; outline: none; overflow-y: auto; word-break: break-word; }

    .richtext-area img { max-width: 100%; height: auto; border-radius: 4px; margin: 4px 0; }
  </style>

  <style id="__req_tip_style2__">
.req-anno-btn{display:inline-block;background:#e67e00;color:#fff;border:none;border-radius:3px;
  padding:1px 7px;font-size:11px;line-height:18px;cursor:pointer;margin-right:8px;
  vertical-align:middle;font-weight:600;opacity:.9}
.req-anno-btn:hover{background:#cf6c00;opacity:1}
.req-anno-box{display:none}
#__req_modal__ *{box-sizing:border-box}
</style>
<script>
function toggleReqAnno(btn) {
  var box = btn.parentElement.querySelector('.req-anno-box');
  if (!box) return;
  if (document.getElementById('__req_modal__')) return;
  var ov = document.createElement('div');
  ov.id = '__req_modal__';
  ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);'
    + 'z-index:999998;display:flex;align-items:center;justify-content:center';
  var card = document.createElement('div');
  card.style.cssText = 'background:#fff;border-radius:8px;padding:24px 28px 20px;max-width:420px;'
    + 'width:92%;box-shadow:0 8px 32px rgba(0,0,0,.22);position:relative;border-top:4px solid #e67e00';
  var cls = document.createElement('button');
  cls.innerHTML = '&times;';
  cls.style.cssText = 'position:absolute;top:10px;right:14px;background:none;border:none;'
    + 'font-size:22px;line-height:1;cursor:pointer;color:#aaa;padding:0';
  cls.onclick = function () { ov.remove(); };
  var ttl = document.createElement('div');
  ttl.style.cssText = 'font-size:13px;font-weight:700;color:#e67e00;margin-bottom:12px;letter-spacing:.5px';
  ttl.textContent = '📋 需求说明';
  var body = document.createElement('div');
  body.style.cssText = 'font-size:12px;color:#5a4000;line-height:1.9;white-space:pre-line;'
    + 'background:#fffbe6;padding:12px 14px;border-radius:6px;border-left:3px solid #e67e00;'
    + 'max-height:60vh;overflow-y:auto';
  body.textContent = box.textContent.trim();
  card.appendChild(cls); card.appendChild(ttl); card.appendChild(body);
  ov.appendChild(card);
  ov.onclick = function (e) { if (e.target === ov) ov.remove(); };
  document.body.appendChild(ov);
}
</script>
</head>

      { id: 254, name: '906测试-弹窗说明', alias: '906测试2-弹窗说明', deliver_type: '', gift_type: '生活特权', source: 'self', cost_level: '低价值', value: 0, stock: 0, expire_type: 'follow', intro_type: 'popup', claim_page: '', privilege_tag: '', version_min: '8.95.1', version_max: '', status: 1 },
      { id: 253, name: '亲友卡兑换年卡*1', alias: '亲友卡兑换年卡*1', deliver_type: '', gift_type: '邀请码', source: 'self', cost_level: '低价值', value: 0, stock: 0, expire_type: 'follow', intro_type: 'none', claim_page: '', privilege_tag: '', version_min: '', version_max: '', status: 1 },
      { id: 252, name: '亲友卡兑换年卡*2', alias: '亲友卡兑换年卡2', deliver_type: '', gift_type: '邀请码', source: 'self', cost_level: '低价值', value: 0, stock: 0, expire_type: 'follow', intro_type: 'none', claim_page: '', privilege_tag: '', version_min: '', version_max: '', status: 1 },
      { id: 250, name: '测试赠礼-已失效', alias: '测试', deliver_type: '线上领取', gift_type: '实物', source: 'self', cost_level: '低价值', value: 1, stock: 0, expire_type: 'follow', intro_type: 'none', claim_page: '', privilege_tag: '', version_min: '', version_max: '', status: 2 },
      // 带规格配置的测试数据
      { id: 276, name: '定制礼盒套装', alias: '定制礼盒-测试规格', deliver_type: '物流发货', gift_type: '实物', source: 'self', cost_level: '高价值', value: 99, stock: 200, expire_type: 'follow', intro_type: 'none', claim_page: 'vip_center', privilege_tag: '', version_min: '', version_max: '', status: 1, has_specs: true, spec_group_name: '尺码', specs: [{ name: 'S', stock: 50 }, { name: 'M', stock: 80 }, { name: 'L', stock: 70 }] },
    ];

    async function apiPost(path, body) {
      const res = await fetch(API_CONFIG.baseURL + path, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        credentials: 'include', body: body ? JSON.stringify(body) : undefined
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    const app = createApp({
      setup() {
        const siderCollapsed = ref(false);
        const opToolsOpen = ref(false);
        const deployOpen = ref(false);
        const priceManageOpen = ref(false);
        const productManageOpen = ref(true);
        const lotteryManageOpen = ref(false);
        const activeParent = ref('product');
        const subMenuMaxHeight = ref('2000px');
        const saving = ref(false);
        const loading = ref(true);

        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id') || '';

        const formData = reactive({
          id: editId,
          source: 'self',
          gift_type: 'physical',
          deliver_type: 'online',
          name: '',
          alias: '',
          version_min: '',
          version_max: '',
          cost_level: 'low',
          privilege_tag: '',
          value: 0,
          stock: 0,
          expire_type: 'follow',
          intro_type: 'none',
          claim_page: '',
          usage_notes: '',
          icon: null,
          icon_preview: '',
          ext_images: [null],
          member_876: null,
          member_877: null,
          success_popup: null,
          // 规格配置
          has_specs: false,
          spec_group_name: '尺码',
          specs: [{ name: '', stock: 0 }],
        });

        const errors = reactive({ name: '', alias: '', value: '' });

        function loadData() {
          loading.value = true;
          if (USE_MOCK) {
            setTimeout(() => {
              const item = MOCK_DATA.find(m => String(m.id) === String(editId));
              if (item) {
                formData.id = item.id;
                formData.name = item.name;
                formData.alias = item.alias;
                formData.source = item.source || 'self';
                formData.gift_type = GIFT_TYPE_MAP[item.gift_type] || 'physical';
                formData.deliver_type = DELIVER_TYPE_MAP[item.deliver_type] || 'online';
                formData.cost_level = COST_LEVEL_MAP[item.cost_level] || 'low';
                formData.value = item.value || 0;
                formData.stock = item.stock || 0;
                formData.expire_type = item.expire_type || 'follow';
                formData.intro_type = item.intro_type || 'none';
                formData.claim_page = item.claim_page || '';
                formData.privilege_tag = item.privilege_tag || '';
                formData.version_min = item.version_min || '';
                formData.version_max = item.version_max || '';
                // 规格配置
                if (item.has_specs) {
                  formData.has_specs = true;
                  formData.spec_group_name = item.spec_group_name || '尺码';
                  formData.specs = item.specs && item.specs.length > 0
                    ? item.specs.map(s => ({ ...s }))
                    : [{ name: '', stock: 0 }];
                }
              }
              loading.value = false;
            }, 200);
          } else {
            apiPost('/gift/detail', { id: editId }).then(res => {
              if (res.data) {
                Object.assign(formData, res.data);
              }
            }).finally(() => { loading.value = false; });
          }
        }

        onMounted(loadData);

        function incrementValue() { formData.value++; }
        function decrementValue() { if (formData.value > 0) formData.value--; }
        function validateValue() { formData.value = Math.max(0, Number(formData.value) || 0); }
        function addExtImage() { formData.ext_images.push(null); }

        // 规格配置
        function addSpec() { formData.specs.push({ name: '', stock: 0 }); }
        function removeSpec(idx) { if (formData.specs.length > 1) formData.specs.splice(idx, 1); }
        const specTotalStock = Vue.computed(() => {
          if (!formData.has_specs || !formData.specs) return 0;
          return formData.specs.reduce((sum, s) => sum + (Number(s.stock) || 0), 0);
        });

        function handleIconUpload(e) {
          const file = e.target.files[0];
          if (file) { formData.icon = file; const reader = new FileReader(); reader.onload = (ev) => { formData.icon_preview = ev.target.result; }; reader.readAsDataURL(file); }
        }
        function handleExtImageUpload(e, idx) { const file = e.target.files[0]; if (file) { formData.ext_images[idx] = file; } }
        function handleMember876Upload(e) { formData.member_876 = e.target.files[0]; }
        function handleMember877Upload(e) { formData.member_877 = e.target.files[0]; }
        function handleSuccessPopupUpload(e) { formData.success_popup = e.target.files[0]; }

        // 富文本编辑器
        const usageNotesEditor = ref(null);
        function execBold() { document.execCommand('bold', false); usageNotesEditor.value?.focus(); }
        function execItalic() { document.execCommand('italic', false); usageNotesEditor.value?.focus(); }
        function execUnderline() { document.execCommand('underline', false); usageNotesEditor.value?.focus(); }
        function execForeColor(e) { document.execCommand('foreColor', false, e.target.value); usageNotesEditor.value?.focus(); }
        function execClearFormat() { document.execCommand('removeFormat', false); usageNotesEditor.value?.focus(); }
        function handleUsageNotesImage(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const el = usageNotesEditor.value;
            if (el) { el.focus(); document.execCommand('insertImage', false, ev.target.result); }
          };
          reader.readAsDataURL(file);
          e.target.value = '';
        }
        function onUsageNotesInput(e) {
          formData.usage_notes = e.target.innerHTML;
        }

        function validate() {
          let valid = true;
          errors.name = errors.alias = errors.value = '';
          if (!formData.name.trim()) { errors.name = '请输入赠礼名称'; valid = false; }
          if (!formData.alias.trim()) { errors.alias = '请输入赠礼别名'; valid = false; }
          if (!formData.value || formData.value <= 0) { errors.value = '请输入赠礼价值'; valid = false; }
          return valid;
        }

        async function handleSave() {
          if (!validate()) return;
          if (saving.value) return;
          saving.value = true;
          try {
            if (USE_MOCK) {
              await new Promise(r => setTimeout(r, 500));
              alert(`Mock: 赠礼"${formData.name}"修改成功！`);
              window.location.href = convertUrl('/gift/list');
            } else {
              const res = await apiPost(`/gift/${formData.id}/update`, formData);
              if (res.code === 0 || res.success) { window.location.href = convertUrl('/gift/list'); }
              else { alert(res.message || '修改失败'); }
            }
          } catch (e) { alert('修改失败: ' + e.message); }
          finally { saving.value = false; }
        }

        function convertUrl(url) {
          if (location.hostname.includes('github.io') || location.protocol === 'file:') {
            const [path, query] = url.split('?');
            const parts = path.replace(/^\//, '').replace(/\/$/, '').split('/');
            return parts.join('-') + '.html' + (query ? '?' + query : '');
          }
          return url;
        }

        function navigateTo(url) {
          if (location.hostname.includes('github.io') || location.protocol === 'file:') {
            const [path, query] = url.split('?');
            const parts = path.replace(/^\//, '').replace(/\/$/, '').split('/');
            window.location.href = parts.join('-') + '.html' + (query ? '?' + query : '');
          } else { window.location.href = url; }
        }

        return {
          siderCollapsed, opToolsOpen, deployOpen, priceManageOpen,
          productManageOpen, lotteryManageOpen, activeParent, subMenuMaxHeight,
          formData, errors, saving, loading,
          incrementValue, decrementValue, validateValue, addExtImage, addSpec, removeSpec, specTotalStock,
          handleIconUpload, handleExtImageUpload,
          handleMember876Upload, handleMember877Upload, handleSuccessPopupUpload,
          handleSave, navigateTo, convertUrl,
          execBold, execItalic, execUnderline, execClearFormat, execForeColor,
          handleUsageNotesImage, onUsageNotesInput, usageNotesEditor,
        };
      }
    });
    app.mount('#app');
  </script>
</body>
</html>
