<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订阅管理系统 - 新建价格策略</title>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@3.2.20/dist/antd.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: #f5f5f5; color: #333;
    }
    #app { min-height: 100vh; }

    .app-header {
      height: 48px; background: #fff; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03); z-index: 100;
      position: sticky; top: 0;
    }
    .app-header .header-left { display: flex; align-items: center; gap: 4px; }
    .header-left .menu-fold-btn {
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 4px; font-size: 16px; color: #666; transition: all .15s;
    }
    .header-left .menu-fold-btn:hover { background: #f5f5f5; color: #ff4d88; }
    .header-left .brand { font-weight: 600; font-size: 15px; color: #333; margin-left: 8px; user-select: none; }
    .app-header .header-right { display: flex; align-items: center; gap: 8px; }
    .header-right .user-info { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 13px; color: #666; }
    .header-right .user-info:hover { background: #f5f5f5; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: #ff4d88; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; }

    .layout-body { display: flex; height: calc(100vh - 48px); }
    .app-sider {
      width: 200px; background: #fff; border-right: 1px solid #f0f0f0;
      transition: width .2s; overflow-y: auto; flex-shrink: 0;
    }
    .app-sider.collapsed { width: 60px; }
    .sider-logo { height: 48px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #f0f0f0; }
    .sider-logo .logo-icon { font-size: 22px; color: #ff4d88; }
    .sider-logo .logo-text { font-size: 14px; font-weight: 600; margin-left: 8px; white-space: nowrap; }
    .sider-menu { padding: 8px 0; }
    .sider-menu-item {
      display: flex; align-items: center; height: 44px; padding: 0 16px;
      font-size: 13px; color: rgba(0,0,0,.65); text-decoration: none;
      transition: all .2s ease; cursor: pointer; white-space: nowrap;
      border-left: 3px solid transparent;
    }
    .sider-menu-item:hover { background: linear-gradient(90deg,rgba(255,77,136,.06),transparent); color: #ff4d88; }
    .sider-menu-item.active { color: #ff4d88; background: linear-gradient(90deg,rgba(255,77,136,.08),rgba(255,77,136,.01)); border-left-color: #ff4d88; }
    .sider-menu-item.parent-open { color: rgba(0,0,0,.8); font-weight: 500; }
    .sider-submenu { overflow: hidden; transition: max-height .3s cubic-bezier(0.4,0,0.2,1); }
    .sider-submenu .sider-menu-item { padding-left: 40px; height: 36px; font-size: 12px; border-left: 3px solid transparent; }
    .sider-submenu .sider-menu-item.active { color: #ff4d88; background: #fff0f6; border-left-color: #ff4d88; font-weight: 500; }
    .sider-submenu .sider-menu-item:not(.active):hover { background: linear-gradient(90deg,rgba(255,77,136,.06),transparent); color: #ff4d88; }

    .content-area { flex: 1; background: #f0f2f5; overflow-x: auto; }
    .page-body { background: #fff; padding: 16px 24px 24px; min-height: 100%; }

    .breadcrumb { font-size: 13px; color: #999; margin-bottom: 16px; }
    .breadcrumb a { color: #ff4d88; text-decoration: none; }
    .breadcrumb a:hover { color: #ff3875; }
    .breadcrumb span { margin: 0 4px; }

    /* 表单样式 — 严格还原线上弹窗结构 */
    .form-section {
      max-width: 640px;
    }
    .form-item {
      display: flex; align-items: center; margin-bottom: 16px;
      min-height: 32px;
    }
    .form-item.hidden { display: none; }
    .form-item-label {
      width: 100px; text-align: right; padding-right: 12px;
      font-size: 13px; color: #333; flex-shrink: 0; line-height: 32px;
    }
    .form-item-label.required::before {
      content: '*'; color: #ff4d88; margin-right: 3px;
    }
    .form-item-control {
      flex: 1; display: flex; align-items: center;
    }

    .input-field {
      height: 32px; padding: 0 11px; font-size: 13px; border: 1px solid #d9d9d9;
      border-radius: 4px; outline: none; background: #fff; color: #333; width: 100%;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-field:focus { border-color: #ff4d88; box-shadow: 0 0 0 2px rgba(255,77,136,.1); }
    .input-field:disabled { background: #f5f5f5; color: #999; cursor: not-allowed; }
    .input-field::placeholder { color: #bbb; }

    .select-field {
      height: 32px; padding: 0 8px; font-size: 13px; border: 1px solid #d9d9d9;
      border-radius: 4px; outline: none; background: #fff; color: #333; width: 100%;
      cursor: pointer; appearance: auto;
    }
    .select-field:focus { border-color: #ff4d88; box-shadow: 0 0 0 2px rgba(255,77,136,.1); }

    .form-actions {
      display: flex; gap: 8px; margin-top: 24px; padding-top: 16px;
      border-top: 1px solid #f0f0f0; padding-left: 100px;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 4px;
      height: 32px; padding: 0 16px; font-size: 13px;
      background: #ff4d88; color: #fff; border: 1px solid #ff4d88;
      border-radius: 4px; cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-primary:hover { background: #ff3875; border-color: #ff3875; }
    .btn-primary:disabled { background: #f5a0c5; border-color: #f5a0c5; cursor: not-allowed; }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 4px;
      height: 32px; padding: 0 16px; font-size: 13px;
      background: #fff; color: #666; border: 1px solid #d9d9d9;
      border-radius: 4px; cursor: pointer; transition: all .2s; white-space: nowrap;
      text-decoration: none; line-height: 32px;
    }
    .btn-outline:hover { color: #ff4d88; border-color: #ff4d88; }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <!-- 顶部导航 -->
    <header class="app-header">
      <div class="header-left">
        <div class="menu-fold-btn" @click="siderCollapsed = !siderCollapsed" :title="siderCollapsed ? '展开菜单' : '折叠菜单'">☰</div>
        <span class="brand">订阅管理系统</span>
      </div>
      <div class="header-right">
        <div class="user-info">
          <div class="user-avatar">张</div>
          <span>周九</span>
          <span>▾</span>
        </div>
      </div>
    </header>

    <div class="layout-body">
      <!-- 左侧菜单 -->
      <aside class="app-sider" :class="{ collapsed: siderCollapsed }">
        <div class="sider-logo">
          <span class="logo-icon">♥</span>
          <span class="logo-text" v-show="!siderCollapsed">导航菜单</span>
        </div>
        <nav class="sider-menu">
          <a class="sider-menu-item" href="javascript:;"><span class="menu-icon">📋</span><span class="menu-label" v-show="!siderCollapsed">订单管理</span></a>
          <a class="sider-menu-item" href="javascript:;"><span class="menu-icon">👥</span><span class="menu-label" v-show="!siderCollapsed">用户管理</span></a>
          <a class="sider-menu-item" href="javascript:;"><span class="menu-icon">🖼️</span><span class="menu-label" v-show="!siderCollapsed">素材管理</span></a>
          <a class="sider-menu-item" href="javascript:;"><span class="menu-icon">🔗</span><span class="menu-label" v-show="!siderCollapsed">拼团管理</span></a>
          <div class="sider-menu-item" :class="{ 'parent-open': opToolsOpen }" @click="opToolsOpen = !opToolsOpen">
            <span class="menu-icon">🔧</span>
            <span class="menu-label" v-show="!siderCollapsed">运营工具</span>
            <span class="menu-arrow" :class="{ open: opToolsOpen }" v-show="!siderCollapsed">▶</span>
          </div>
          <div class="sider-submenu" @click.stop :style="{ maxHeight: opToolsOpen && !siderCollapsed ? subMenuMaxHeight : '0' }">
            <a class="sider-menu-item" href="javascript:;"><span class="menu-label">弹窗</span></a>
            <a class="sider-menu-item" href="javascript:;"><span class="menu-label">兑换码</span></a>
            <a class="sider-menu-item" href="javascript:void(0)" @click.stop="navigateTo('/gift-strategy/list')"><span class="menu-label">赠礼发放策略</span></a>
            <a class="sider-menu-item" href="javascript:void(0)" @click.stop="navigateTo('/promotion-strategy/list')"><span class="menu-label">限时促销策略</span></a>
            <a class="sider-menu-item" href="javascript:;"><span class="menu-label">赠礼物流管理</span></a>
            <a class="sider-menu-item" href="javascript:void(0)" @click.stop="navigateTo('/event-pricing-strategy/list')"><span class="menu-label">活动价格策略</span></a>
            <a class="sider-menu-item" href="javascript:void(0)" @click.stop="navigateTo('/event-operations-strategy/list')"><span class="menu-label">活动投放策略</span></a>
          </div>
          <div class="sider-menu-item" :class="{ 'parent-open': deployOpen }" @click="deployOpen = !deployOpen">
            <span class="menu-icon">📢</span>
            <span class="menu-label" v-show="!siderCollapsed">运营位投放策略</span>
            <span class="menu-arrow" :class="{ open: deployOpen }" v-show="!siderCollapsed">▶</span>
          </div>
          <div class="sider-submenu" @click.stop :style="{ maxHeight: deployOpen && !siderCollapsed ? '110px' : '0' }">
            <a class="sider-menu-item" href="javascript:void(0)" @click.stop="navigateTo('/rights-pay/list')"><span class="menu-label">投放策略</span></a>
            <a class="sider-menu-item" href="javascript:;"><span class="menu-label">页面模块展示</span></a>
          </div>
          <div class="sider-menu-item" :class="{ 'parent-open': priceManageOpen, active: activeParents.includes('price') }" @click="priceManageOpen = !priceManageOpen">
            <span class="menu-icon">💰</span>
            <span class="menu-label" v-show="!siderCollapsed">价格管理</span>
            <span class="menu-arrow" :class="{ open: priceManageOpen }" v-show="!siderCollapsed">▶</span>
          </div>
          <div class="sider-submenu" @click.stop :style="{ maxHeight: priceManageOpen && !siderCollapsed ? subMenuMaxHeight : '0' }">
            <a class="sider-menu-item" href="javascript:;"><span class="menu-label">价格套餐</span></a>
            <a class="sider-menu-item active" href="javascript:void(0)" @click.stop="navigateTo('/price-strategy/list')"><span class="menu-label">价格策略</span></a>
            <a class="sider-menu-item" href="javascript:void(0)" @click.stop="navigateTo('/promotion-strategy/list')"><span class="menu-label">促销套餐</span></a>
          </div>
          <a class="sider-menu-item" href="javascript:;"><span class="menu-icon">📦</span><span class="menu-label" v-show="!siderCollapsed">产品管理</span></a>
          <div class="sider-menu-item" :class="{ 'parent-open': lotteryManageOpen }" @click="lotteryManageOpen = !lotteryManageOpen">
            <span class="menu-icon">🎯</span>
            <span class="menu-label" v-show="!siderCollapsed">抽奖管理</span>
            <span class="menu-arrow" :class="{ open: lotteryManageOpen }" v-show="!siderCollapsed">▶</span>
          </div>
          <div class="sider-submenu" @click.stop :style="{ maxHeight: lotteryManageOpen && !siderCollapsed ? subMenuMaxHeight : '0' }">
            <a class="sider-menu-item" href="javascript:void(0)" @click.stop="navigateTo('/prize/list')"><span class="menu-label">奖品管理</span></a>
            <a class="sider-menu-item" href="javascript:void(0)" @click.stop="navigateTo('/coupon/list')"><span class="menu-label">抽奖券管理</span></a>
          </div>
          <a class="sider-menu-item" href="javascript:;"><span class="menu-icon">🏆</span><span class="menu-label" v-show="!siderCollapsed">中奖管理</span></a>
          <a class="sider-menu-item" href="javascript:;"><span class="menu-icon">📜</span><span class="menu-label" v-show="!siderCollapsed">订阅管理</span></a>
          <a class="sider-menu-item" href="javascript:;"><span class="menu-icon">📁</span><span class="menu-label" v-show="!siderCollapsed">素材库</span></a>
        </nav>
      </aside>

      <!-- 右侧内容 -->
      <main class="content-area">
        <div class="page-body">
          <!-- 面包屑 -->
          <div class="breadcrumb">
            <a href="javascript:void(0)" @click.stop="navigateTo('/price-strategy/list')">价格策略</a>
            <span>/</span>
            <span>{{ isEdit ? '编辑' : '新建价格策略' }}</span>
          </div>

          <!-- 表单区域 — 严格还原线上弹窗 -->
          <div class="form-section">
            <!-- 隐藏字段 type -->
            <div class="form-item hidden">
              <div class="form-item-control">
                <input class="input-field" type="text" value="0" disabled />
              </div>
            </div>

            <!-- 价格策略名称 -->
            <div class="form-item">
              <label class="form-item-label required" title="价格策略名称">价格策略名称</label>
              <div class="form-item-control">
                <input class="input-field" v-model="form.name" placeholder="请输入，≤15" maxlength="15" />
              </div>
            </div>

            <!-- 各订阅周期关联策略 -->
            <template v-for="period in periods" :key="period.key">
              <!-- 隐藏字段（模拟线上结构） -->
              <div class="form-item hidden">
                <div class="form-item-control">
                  <input class="input-field" type="text" value="" disabled />
                </div>
              </div>
              <div class="form-item">
                <label class="form-item-label">{{ period.label }}</label>
                <div class="form-item-control">
                  <select class="select-field" v-model="form.mapping[period.key]">
                    <option value="">请选择</option>
                    <option v-for="opt in periodOptions[period.key]" :key="opt.value" :value="opt.value">
                      {{ opt.label }}
                    </option>
                  </select>
                </div>
              </div>
            </template>

            <!-- 操作按钮 -->
            <div class="form-actions">
              <a class="btn-outline" href="javascript:void(0)" @click.stop="navigateTo('/price-strategy/list')">取 消</a>
              <button class="btn-primary" @click="handleSave" :disabled="!canSave">保 存</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3.3.13/dist/vue.global.js"></script>
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue;

    createApp({
      setup() {
        const siderCollapsed = ref(false);
        const opToolsOpen = ref(false);
        const priceManageOpen = ref(true);
        const lotteryManageOpen = ref(false);
        const deployOpen = ref(false);
        const activeParents = ref(['price']);
        const subMenuMaxHeight = '400px';

        const isEdit = ref(false);

        // 订阅周期列表
        const periods = [
          { key: 'continuousMonth', label: '连续包月' },
          { key: 'continuousQuarter', label: '连续包季' },
          { key: 'continuousYear', label: '连续包年' },
          { key: 'monthCard', label: '月卡' },
          { key: 'quarterCard', label: '季卡' },
          { key: 'yearCard', label: '年卡' },
          { key: 'weekCard', label: '周卡' },
          { key: 'doubleMonthCard', label: '双月卡' },
          { key: 'halfYearCard', label: '半年卡' },
        ];

        // 线上真实选项数据（按周期分类）
        const allStrategyOptions = {
          continuousMonth: [
            { value: '26', label: '连续包月（首月6.8元）' },
            { value: '49', label: '首6月6.8元连续包月学生套餐' },
            { value: '88', label: '连续包月（首月8.8元）' },
            { value: '1', label: '连续包月1' },
            { value: 'copy', label: '连续包y测试-副本' },
            { value: 'ytest', label: '连续包月（首月6.8元）y测试' },
            { value: '0514', label: '0514-一分钱' },
            { value: 'test0513hig', label: '连续包月test0513hig' },
            { value: 'test0513low', label: '连续包月test0513low' },
            { value: 'ygy410', label: 'ygy410免费试用14天' },
          ],
          continuousQuarter: [
            { value: 'c1', label: '连续包季-基础' },
            { value: 'c2', label: '首季6.8元连续包季' },
            { value: 'c3', label: '连续包季学生套餐' },
          ],
          continuousYear: [
            { value: 'cy1', label: '连续包年-基础' },
            { value: 'cy2', label: '首年98元连续包年' },
            { value: 'cy3', label: '连续包年学生套餐' },
          ],
          monthCard: [
            { value: 'm1', label: '月卡-基础' },
            { value: 'm2', label: '月卡-会员日特惠' },
            { value: 'm3', label: '月卡-学生价' },
            { value: 'm4', label: '月卡-iOS价' },
          ],
          quarterCard: [
            { value: 'q1', label: '季卡-基础' },
            { value: 'q2', label: '季卡-会员日特惠' },
            { value: 'q3', label: '季卡-备孕专享' },
            { value: 'q4', label: '季卡-618狂欢价' },
          ],
          yearCard: [
            { value: 'y1', label: '年卡-基础' },
            { value: 'y2', label: '年卡-会员日特惠' },
            { value: 'y3', label: '年卡-新用户专享' },
            { value: 'y4', label: '年卡-学生价' },
            { value: 'y5', label: '年卡-育儿专享' },
            { value: 'y6', label: '年卡-备孕专享' },
            { value: 'y7', label: '年卡-双11狂欢价' },
            { value: 'y8', label: '年卡（249元）' },
          ],
          weekCard: [
            { value: 'w1', label: '周卡-基础' },
            { value: 'w2', label: '周卡-体验价' },
          ],
          doubleMonthCard: [
            { value: 'd1', label: '双月卡-基础' },
            { value: 'd2', label: '双月卡-限时特惠' },
          ],
          halfYearCard: [
            { value: 'h1', label: '半年卡_99元-基础' },
            { value: 'h2', label: '半年卡-育儿专享' },
            { value: 'h3', label: '半年卡-双11狂欢价' },
          ],
        };

        // 实际使用的选项（后续可从列表页传入）
        const periodOptions = ref(allStrategyOptions);

        // 表单数据
        const form = reactive({
          name: '',
          mapping: {
            continuousMonth: '',
            continuousQuarter: '',
            continuousYear: '',
            monthCard: '',
            quarterCard: '',
            yearCard: '',
            weekCard: '',
            doubleMonthCard: '',
            halfYearCard: '',
          },
        });

        // 解析 URL 参数（编辑场景）
        onMounted(() => {
          const params = new URLSearchParams(window.location.search);
          const id = params.get('id');
          if (id) {
            isEdit.value = true;
            loadData(id);
          }
        });

        function loadData(id) {
          // 模拟加载已有数据
          const mockData = {
            '1154': {
              name: '亲友卡活动页_ios',
              mapping: {
                continuousMonth: '',
                continuousQuarter: '',
                continuousYear: '',
                monthCard: '',
                quarterCard: '',
                yearCard: 'y1',
                weekCard: '',
                doubleMonthCard: '',
                halfYearCard: '',
              },
            },
            '1152': {
              name: '26年618-历史非育儿(首2',
              mapping: {
                continuousMonth: '26',
                continuousQuarter: 'c1',
                continuousYear: 'cy1',
                monthCard: 'm1',
                quarterCard: 'q1',
                yearCard: 'y1',
                weekCard: '',
                doubleMonthCard: '',
                halfYearCard: 'h1',
              },
            },
          };
          const data = mockData[id];
          if (data) {
            form.name = data.name;
            Object.assign(form.mapping, data.mapping);
          }
        }

        // 是否可保存：策略名称必填
        const canSave = computed(() => {
          return form.name.trim().length > 0;
        });

        function handleSave() {
          if (!canSave.value) {
            alert('请填写价格策略名称');
            return;
          }

          // 检查是否有任何周期被选中
          const hasAnySelection = Object.values(form.mapping).some(v => v);
          if (!hasAnySelection) {
            alert('请至少选择一个订阅周期并关联价格策略');
            return;
          }

          const action = isEdit.value ? '修改' : '创建';
          alert(action + '价格策略成功！');
          window.location.href = '/price-strategy/list';
        }

        function navigateTo(url) { window.location.href = url; }

        return {
          siderCollapsed, opToolsOpen, priceManageOpen, lotteryManageOpen, deployOpen, subMenuMaxHeight, activeParents,
          isEdit,
          periods, periodOptions,
          form,
          canSave, handleSave, navigateTo,
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
