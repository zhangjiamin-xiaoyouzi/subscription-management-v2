    .sider-logo .logo-icon { width: 24px; height: 24px; background: #ff4d88; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; flex-shrink: 0; }
    .sider-logo .logo-text { white-space: nowrap; }
    .sider-menu { flex: 1; padding: 4px 0; }
    .sider-menu-item { display: flex; align-items: center; gap: 10px; padding: 0 16px; height: 40px; font-size: 13px; color: rgba(0,0,0,.6); cursor: pointer; text-decoration: none; transition: all .2s ease; white-space: nowrap; overflow: hidden; border-left: 3px solid transparent; }
    .sider-menu-item .menu-icon { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }
    .sider-menu-item .menu-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .sider-menu-item .menu-arrow { font-size: 10px; color: rgba(0,0,0,.25); flex-shrink: 0; transition: transform .2s; }
    .sider-menu-item .menu-arrow.open { transform: rotate(90deg); }
    .sider-menu-item:hover { background: linear-gradient(90deg,rgba(255,77,136,.06),transparent); color: #ff4d88; }
    .sider-menu-item.active { color: #ff4d88; background: linear-gradient(90deg,rgba(255,77,136,.08),rgba(255,77,136,.01)); border-left-color: #ff4d88; }
    .sider-menu-item.parent-open { color: rgba(0,0,0,.8); font-weight: 500; }
    .sider-submenu { overflow: hidden; transition: max-height .3s cubic-bezier(0.4,0,0.2,1); }

    .content-area { flex: 1; background: #f0f2f5; overflow-y: auto; }
    .page-body { padding: 16px 24px 24px; }
    .breadcrumb { font-size: 13px; color: #999; margin-bottom: 16px; }
    .breadcrumb a { color: #ff4d88; text-decoration: none; }
    .breadcrumb a:hover { color: #ff3875; }
    .breadcrumb span { color: #666; }
    .detail-card { background: #fff; border-radius: 4px; padding: 24px; margin-bottom: 16px; }
    .detail-card h5.section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
    .detail-row { display: flex; align-items: flex-start; margin-bottom: 16px; }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-label { width: 140px; flex-shrink: 0; padding-right: 12px; font-size: 13px; color: #888; line-height: 32px; text-align: right; }
    .detail-content { flex: 1; min-height: 32px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 13px; color: #333; }
    .detail-content .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
    .tag.green { background: #f6ffed; color: #52c41a; }
    .tag.red { background: #fff2f0; color: #ff4d4f; }
    .tag.blue { background: #e6f7ff; color: #1890ff; }
    .tag.orange { background: #fff7e6; color: #fa8c16; }
    .detail-empty { color: #ccc; }
    .detail-actions { display: flex; justify-content: center; gap: 12px; padding: 20px 0; }
    .btn-primary { display: inline-flex; align-items: center; gap: 4px; height: 36px; padding: 0 24px; font-size: 14px; background: #ff4d88; color: #fff; border: 1px solid #ff4d88; border-radius: 4px; cursor: pointer; transition: all .2s; white-space: nowrap; text-decoration: none; }

    .btn-back { display: inline-flex; align-items: center; height: 36px; padding: 0 24px; font-size: 14px; background: #fff; color: #666; border: 1px solid #d9d9d9; border-radius: 4px; cursor: pointer; transition: all .2s; text-decoration: none; }
    .btn-back:hover { border-color: #ff4d88; color: #ff4d88; }

              </div>
            </div>

      { id: 255, name: '906测试-无说明', alias: '906测试2-无说明', deliver_type: '', gift_type: '生活特权', source: 'self', cost_level: '低价值', value: 0, stock: 0, expire_type: 'follow', intro_type: 'none', claim_page: '', privilege_tag: '', version_min: '8.95.1', version_max: '', status: 1 },
      { id: 254, name: '906测试-弹窗说明', alias: '906测试2-弹窗说明', deliver_type: '', gift_type: '生活特权', source: 'self', cost_level: '低价值', value: 0, stock: 0, expire_type: 'follow', intro_type: 'popup', claim_page: '', privilege_tag: '', version_min: '8.95.1', version_max: '', status: 1 },
      { id: 253, name: '亲友卡兑换年卡*1', alias: '亲友卡兑换年卡*1', deliver_type: '', gift_type: '邀请码', source: 'self', cost_level: '低价值', value: 0, stock: 0, expire_type: 'follow', intro_type: 'none', claim_page: '', privilege_tag: '', version_min: '', version_max: '', status: 1 },
      { id: 252, name: '亲友卡兑换年卡*2', alias: '亲友卡兑换年卡2', deliver_type: '', gift_type: '邀请码', source: 'self', cost_level: '低价值', value: 0, stock: 0, expire_type: 'follow', intro_type: 'none', claim_page: '', privilege_tag: '', version_min: '', version_max: '', status: 1 },
      { id: 250, name: '测试赠礼-已失效', alias: '测试', deliver_type: '线上领取', gift_type: '实物', source: 'self', cost_level: '低价值', value: 1, stock: 0, expire_type: 'follow', intro_type: 'none', claim_page: '', privilege_tag: '', version_min: '', version_max: '', status: 2 },
    ];

    const SOURCE_LABELS = { self: '美柚自营', third: '第三方' };
    const GIFT_TYPE_LABELS = { physical: '实物', coupon: '卡券', vip: '会员会期', lottery: '抽奖次数', invite: '邀请码' };
    const COST_LABELS = { low: '低价值', high: '高价值' };
    const EXPIRE_LABELS = { follow: '跟随订阅周期', relative: '相对时间' };
    const INTRO_LABELS = { none: '无', popup: '弹窗介绍', page: '跳转页面' };
    const CLAIM_PAGE_LABELS = { vip_center: '会员中心', order_list: '订单列表', personal_center: '个人中心', app_home: 'App首页' };

    async function apiPost(path, body) {
      const res = await fetch(API_CONFIG.baseURL + path, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        credentials: 'include', body: body ? JSON.stringify(body) : undefined
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    const app = createApp({
      setup() {
        const siderCollapsed = ref(false);
        const opToolsOpen = ref(false);
        const deployOpen = ref(false);
        const priceManageOpen = ref(false);
        const productManageOpen = ref(true);
        const lotteryManageOpen = ref(false);
        const activeParent = ref('product');
        const subMenuMaxHeight = ref('2000px');
        const loading = ref(true);

        const urlParams = new URLSearchParams(window.location.search);
        const viewId = urlParams.get('id') || '';

        const data = reactive({
          id: '', name: '', alias: '', deliver_type: '', gift_type: '', source: '',
          cost_level: '', value: 0, stock: 0, expire_type: '', intro_type: '',
          claim_page: '', privilege_tag: '', version_min: '', version_max: '',
          icon_preview: '', ext_images: [], member_876: '', member_877: '', success_popup: '',
        });

        const sourceLabel = computed(() => SOURCE_LABELS[data.source] || data.source || '—');
        const giftTypeLabel = computed(() => GIFT_TYPE_LABELS[data.gift_type] || data.gift_type || '—');
        const deliverTypeLabel = computed(() => data.deliver_type || '');
        const costLevelLabel = computed(() => COST_LABELS[data.cost_level] || data.cost_level || '—');
        const expireTypeLabel = computed(() => EXPIRE_LABELS[data.expire_type] || data.expire_type || '—');
        const introTypeLabel = computed(() => INTRO_LABELS[data.intro_type] || data.intro_type || '—');
        const claimPageLabel = computed(() => CLAIM_PAGE_LABELS[data.claim_page] || data.claim_page || '');

        function loadData() {
          loading.value = true;
          if (USE_MOCK) {
            setTimeout(() => {
              const item = MOCK_DATA.find(m => String(m.id) === String(viewId));
              if (item) {
                data.id = item.id;
                data.name = item.name;
                data.alias = item.alias;
                data.source = item.source || 'self';
                data.gift_type = GIFT_TYPE_LABELS[item.gift_type] ? Object.keys(GIFT_TYPE_LABELS).find(k => GIFT_TYPE_LABELS[k] === item.gift_type) || item.gift_type : item.gift_type;
                data.deliver_type = item.deliver_type || '';
                data.cost_level = item.cost_level === '高价值' ? 'high' : 'low';
                data.value = item.value || 0;
                data.stock = item.stock || 0;
                data.expire_type = item.expire_type || 'follow';
                data.intro_type = item.intro_type || 'none';
                data.claim_page = item.claim_page || '';
                data.privilege_tag = item.privilege_tag || '';
                data.version_min = item.version_min || '';
                data.version_max = item.version_max || '';
              }
              loading.value = false;
            }, 200);
          } else {
            apiPost('/gift/detail', { id: viewId }).then(res => {
              if (res.data) Object.assign(data, res.data);
            }).finally(() => { loading.value = false; });
          }
        }

        onMounted(loadData);

        function convertUrl(url) {
          if (location.hostname.includes('github.io')) {
            const [path, query] = url.split('?');
            const parts = path.replace(/^\//, '').replace(/\/$/, '').split('/');
            return parts.join('-') + '.html' + (query ? '?' + query : '');
          }
          return url;
        }

        function navigateTo(url) {
          if (location.hostname.includes('github.io')) {
            const [path, query] = url.split('?');
            const parts = path.replace(/^\//, '').replace(/\/$/, '').split('/');
            window.location.href = parts.join('-') + '.html' + (query ? '?' + query : '');
          } else { window.location.href = url; }
        }

        return {
          siderCollapsed, opToolsOpen, deployOpen, priceManageOpen,
          productManageOpen, lotteryManageOpen, activeParent, subMenuMaxHeight,
          viewId, data, loading,
          sourceLabel, giftTypeLabel, deliverTypeLabel, costLevelLabel,
          expireTypeLabel, introTypeLabel, claimPageLabel,
          navigateTo, convertUrl
        };
      }
    });
    app.mount('#app');
  </script>
</body>
